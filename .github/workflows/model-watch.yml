name: Update Model Watch

on:
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: model-watch-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check official model sources
        run: npm run model-watch:update
      - name: Verify generated data and site build
        run: npm run build
      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/modelWatch.generated.json
          git diff --cached --quiet || git commit -m "chore: refresh model watch"
          git push
